steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "app"
      - "deploy"
      - "app.yaml"
      - "cron.yaml"
      - "--quiet"

serviceAccount: "projects/gcp-just-for/serviceAccounts/gcp-just-for@appspot.gserviceaccount.com"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: "900s"